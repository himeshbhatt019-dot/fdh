<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Card 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: Arial;
    overflow: hidden;
}

/* Card container */
.card {
    width: 300px;
    height: 400px;
    perspective: 1000px;
    z-index: 2;
}

/* Inner flip */
.inner {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 1s;
    transform-style: preserve-3d;
}

/* Flip on hover */
.card:hover .inner {
    transform: rotateY(180deg);
}

/* Front & Back */
.front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 15px;
    backface-visibility: hidden;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

/* FRONT */
.front {
    background: #ff4e50;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

/* BACK */
.back {
    background: white;
    transform: rotateY(180deg);
    text-align: center;
    padding: 20px;
}

/* Text */
h1 {
    margin: 10px 0;
    font-size: 26px;
}

p {
    font-size: 16px;
    color: #555;
}

/* Floating Emoji Style */
.emoji {
    position: absolute;
    font-size: 24px;
    animation: floatUp 5s linear forwards;
}

/* Animation */
@keyframes floatUp {
    from {
        transform: translateY(0);
        opacity: 1;
    }
    to {
        transform: translateY(-600px);
        opacity: 0;
    }
}
</style>

</head>
<body>

<div class="card">
    <div class="inner">

        <!-- FRONT -->
        <div class="front">
            <div>
                <div style="font-size:40px;">🎂🎉</div>

                <h1>
                    Happy Birthday <br> Didi 💖
                </h1>

                <div style="font-size:30px;">🎁✨</div>
            </div>
        </div>

        <!-- BACK -->
        <div class="back">
            <h1>Dear Sister 💕</h1>

            <p>
                You are my sister, my supporter 🤗 & my cashier 😎<br><br>
                Thank you for always supporting me ❤️<br><br>
                May your life be full of happiness ✨🌸
            </p>

            <p>Stay happy always 😊💫</p>
        </div>

    </div>
</div>

<!-- SCRIPT (Your function added correctly) -->
<script>
function createEmoji() {
    const emoji = document.createElement("div");
    emoji.classList.add("emoji");

    emoji.innerHTML = ["🎉","🎂","🎈","💖","✨"][Math.floor(Math.random()*5)];
    
    emoji.style.left = Math.random() * 100 + "vw";
    emoji.style.bottom = "0px";

    document.body.appendChild(emoji);

    setTimeout(() => {
        emoji.remove();
    }, 5000);
}

/* Run continuously */
setInterval(createEmoji, 400);
</script>

</body>
</html>
